services:
  - type: web
    name: ombre-brain
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: OMBRE_TRANSPORT
        value: streamable-http
      - key: OMBRE_API_KEY
        sync: false
      - key: OMBRE_BASE_URL
        sync: false
      - key: OMBRE_BUCKETS_DIR
        value: ./buckets
      - key: DATABASE_URL
        sync: false
